<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SeaSense</title>
  <style>
    :root {
      --bg:       #060e1e;
      --surface:  #0c1a30;
      --elevated: #112540;
      --border:   #1a3050;
      --accent:   #3b82f6;
      --text:     #e2e8f0;
      --dim:      #4a6a8a;
      --muted:    #8aa0be;
      --go:       #10b981;
      --caution:  #f59e0b;
      --danger:   #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #060e1e 0%, #0c1e3d 60%, #091428 100%);
      padding: 26px 32px 22px;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #3b82f6 40%, #10b981 60%, transparent);
    }
    .header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .header-left h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.02em; }
    .header-left h1 em { font-style: normal; color: #60a5fa; }
    .header-tagline { font-size: 0.8rem; color: #4a8fd4; margin: 3px 0 5px; letter-spacing: 0.03em; }
    .header-meta { display: flex; gap: 18px; margin-top: 2px; }
    .header-meta span { font-size: 0.78rem; color: var(--muted); }
    /* ── Control bars shared ── */
    .ctrl-bar {
      background: var(--surface);
      padding: 10px 32px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .ctrl-bar label { font-size: 0.78rem; color: var(--dim); white-space: nowrap; }
    .ctrl-bar select {
      padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none;
      cursor: pointer; transition: border-color 0.2s;
    }
    .ctrl-bar select:focus { border-color: var(--accent); }
    .ctrl-bar input {
      padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none;
      transition: border-color 0.2s;
    }
    .ctrl-bar input:focus { border-color: var(--accent); }
    .bar-sep { width: 1px; height: 22px; background: var(--border); margin: 0 4px; }
    .model-label { font-size: 0.78rem; color: var(--dim); white-space: nowrap; margin-left: 6px; }
    #apiKeyInput { max-width: 280px; flex: 1; }
    #customLat, #customLon { width: 90px; }
    .custom-coords { display: none; align-items: center; gap: 6px; }
    .custom-coords.visible { display: flex; }

    /* keep .api-bar alias */
    .api-bar { background: var(--surface); padding: 10px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .api-bar label { font-size: 0.78rem; color: var(--dim); white-space: nowrap; }
    .api-bar select { padding: 7px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none; cursor: pointer; }
    .api-bar input { padding: 7px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none; max-width: 280px; flex: 1; }
    .btn {
      padding: 7px 18px; border-radius: 6px; border: none;
      background: var(--accent); color: #fff; font-size: 0.84rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s;
    }
    .btn:hover  { background: #2563eb; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { background: #1a3a5f; color: var(--dim); cursor: default; transform: none; }

    /* ── Header right (location) ── */
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .header-loc   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .header-loc label  { font-size: 0.78rem; color: var(--dim); }
    .header-loc select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none; cursor: pointer; }
    .header-loc select:focus { border-color: var(--accent); }
    .header-loc input  { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none; width: 80px; }
    .header-loc input:focus { border-color: var(--accent); }

    /* ── Page layout (sidebar + content) ── */
    .page-layout { display: flex; align-items: flex-start; width: 100%; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      padding: 20px 16px;
      display: flex; flex-direction: column; gap: 14px;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .sb-title  { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); padding-bottom: 10px; border-bottom: 1px solid var(--border); display: block; width: 100%; }
    .sb-apply  { width: 100%; padding: 8px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-size: 0.82rem; font-weight: 600; cursor: pointer; margin-top: 4px; transition: background 0.2s; }
    .sb-apply:hover { background: #2563eb; }
    .sb-group  { display: flex; flex-direction: column; gap: 8px; }
    .sb-badge  { font-size: 0.67rem; font-weight: 700; padding: 3px 10px; border-radius: 20px; letter-spacing: 0.05em; align-self: flex-start; }
    .sb-badge.caution { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .sb-badge.danger  { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .sb-field  { display: flex; flex-direction: column; gap: 3px; }
    .sb-lbl    { font-size: 0.7rem; color: var(--muted); }
    .sb-input  { padding: 6px 8px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 0.84rem; outline: none; width: 100%; }
    .sb-input:focus { border-color: var(--accent); }
    .sb-sep    { height: 1px; background: var(--border); }
    .sb-model-info { margin-top: 4px; padding: 10px 11px; background: var(--elevated); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; gap: 5px; }
    .sb-model-name { font-size: 0.72rem; font-weight: 700; color: var(--accent); }
    .sb-model-desc { font-size: 0.68rem; color: var(--muted); line-height: 1.45; }

    /* ── Drawer button (mobile only) ── */
    .drawer-btn { display: none; }

    /* ── Overlay (mobile only) ── */
    .sidebar-overlay { display: none; }

    /* ── Main ── */
    .main { flex: 1; min-width: 0; padding: 24px 32px; }

    /* ════════════════════════════════
       MOBILE  (≤ 768px)
    ════════════════════════════════ */
    @media (max-width: 768px) {

      /* Header */
      header { padding: 12px 16px 12px 16px; overflow: visible; }
      .header-inner { flex-direction: row; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: nowrap; overflow: visible; }
      .header-left h1 { font-size: 1.32rem; }
      .header-tagline { display: none; }
      .header-right { flex-direction: row; align-items: center; gap: 8px; flex-shrink: 0; }
      .header-loc { flex-direction: column; align-items: flex-start; gap: 4px; }
      .header-loc label { display: none; }
      .header-loc select { font-size: 0.62rem; padding: 4px 5px; max-width: 140px; }
      /* hide lat/lon inputs on mobile unless custom coords selected */
      .custom-coords:not(.visible) { display: none !important; }
      .custom-coords.visible { flex-direction: column; }
      .custom-coords input  { font-size: 0.78rem; padding: 5px 6px; width: 100px; }
      .drawer-btn { align-self: center; flex-shrink: 0; }

      /* Settings bar */
      .ctrl-bar { flex-wrap: wrap; gap: 8px; padding: 8px 14px; }
      .ctrl-bar select, .ctrl-bar input { font-size: 0.8rem; }
      .bar-sep { display: none; }

      /* Drawer button */
      .drawer-btn {
        display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border);
        background: var(--elevated); color: var(--text); font-size: 1.1rem;
        cursor: pointer; flex-shrink: 0;
      }

      /* Sidebar — hidden off-screen, slides in */
      .sidebar {
        position: fixed; top: 0; left: -260px; z-index: 200;
        width: 260px; height: 100vh;
        transition: left 0.25s ease;
        box-shadow: none;
      }
      .sidebar.open {
        left: 0;
        box-shadow: 4px 0 24px rgba(0,0,0,0.5);
      }

      /* Overlay behind drawer */
      .sidebar-overlay {
        display: block;
        position: fixed; inset: 0; z-index: 199;
        background: rgba(0,0,0,0.55);
        opacity: 0; pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .sidebar-overlay.open { opacity: 1; pointer-events: all; }

      /* Page layout — no sidebar column */
      .page-layout { display: block; }
      .main { padding: 12px 14px; }

      /* Cards — 2 columns, compact */
      .cards { grid-template-columns: repeat(2, 1fr) !important; gap: 6px; }
      .fc-body { padding: 8px 9px; }
      .fc-head { margin-bottom: 7px; }
      .fc-time { font-size: 1rem; }
      .fc-wind-speed { font-size: 1.2rem; }
      .fc-wind-sub { font-size: 0.68rem; }
      .fc-wave-val { font-size: 1.05rem; }
      .fc-label { font-size: 0.58rem; }
      .fc-hr { margin: 6px 0; }
      .fc-swell-row { display: none; }
      .big-dir-arrow { font-size: 2rem; width: 2rem; }

      /* Day pills — tighter */
      .day-pill { padding: 8px 10px; }
      .dp-date  { font-size: 0.85rem; }
    }


    /* ── Sun & UV Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(3px);
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 24px 28px; width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 24px 64px rgba(0,0,0,0.6);
      position: relative;
    }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }
    .modal-close {
      position: absolute; top: 16px; right: 18px;
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1; padding: 2px 6px;
      border-radius: 6px; transition: color 0.2s, background 0.2s;
    }
    .modal-close:hover { color: var(--text); background: var(--elevated); }
    .sun-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
    .sun-table th {
      text-align: left; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--dim); padding: 0 10px 10px 0; border-bottom: 1px solid var(--border);
    }
    .sun-table td { padding: 10px 10px 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .sun-table tr:last-child td { border-bottom: none; }
    .sun-day { font-weight: 700; color: var(--text); font-size: 0.88rem; }
    .sun-today { color: var(--accent); }
    .uv-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.04em;
    }
    .uv-low      { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
    .uv-moderate { background: rgba(234,179,8,0.15);  color: #fde047; border: 1px solid rgba(234,179,8,0.25); }
    .uv-high     { background: rgba(249,115,22,0.15); color: #fb923c; border: 1px solid rgba(249,115,22,0.25); }
    .uv-veryhigh { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.25); }
    .uv-extreme  { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.25); }
    .modal-loading { color: var(--muted); font-size: 0.88rem; text-align: center; padding: 24px 0; }
    @media (max-width: 768px) {
      .modal-box { padding: 18px 16px; margin: 12px; }
      .sun-table th, .sun-table td { padding: 8px 6px 8px 0; font-size: 0.78rem; }
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(16px);
      background: #1e3a5f; border: 1px solid var(--accent); color: #93c5fd;
      padding: 9px 22px; border-radius: 8px; font-size: 0.84rem; font-weight: 600;
      opacity: 0; pointer-events: none; transition: opacity 0.25s, transform 0.25s;
      z-index: 500; white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Wind trend in day pill ── */
    .dp-trend { font-size: 0.82rem; font-weight: 700; margin-left: 3px; }
    .dp-trend.up   { color: #f87171; }
    .dp-trend.down { color: #34d399; }
    .dp-trend.flat { color: var(--muted); }

    /* ── Refresh timer ── */
    .refresh-timer { font-size: 0.72rem; color: var(--dim); display: flex; align-items: center; gap: 4px; cursor: pointer; }
    .refresh-timer:hover { color: var(--muted); }

    /* ── Status bar ── */
    .status-bar { padding: 11px 16px; border-radius: 8px; margin-bottom: 18px; font-size: 0.84rem; display: flex; align-items: center; gap: 8px; }
    .status-bar.error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #fca5a5; }
    .status-bar.loading { background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #93c5fd; }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(59,130,246,0.3); border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 28px; flex-wrap: wrap;
      padding: 14px 18px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      margin-bottom: 22px;
    }
    .lg-group { display: flex; flex-direction: column; gap: 4px; }
    .lg-title { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 3px; }
    .lg-item  { display: flex; align-items: center; gap: 7px; font-size: 0.74rem; color: var(--muted); }
    .lg-dot   { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── Day nav ── */
    .day-nav { display: flex; gap: 10px; margin-bottom: 26px; overflow-x: auto; padding-bottom: 4px; }
    .day-nav::-webkit-scrollbar { height: 3px; }
    .day-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .day-pill {
      flex-shrink: 0; text-decoration: none;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 15px;
      transition: border-color 0.2s, background 0.2s;
    }
    .day-pill:hover { border-color: var(--accent); background: var(--elevated); }
    .dp-weekday { font-size: 0.72rem; color: var(--dim); }
    .dp-date    { font-size: 0.95rem; font-weight: 700; color: var(--text); margin: 1px 0 5px; }
    .dp-stats     { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .dp-stat-row  { display: flex; align-items: baseline; gap: 5px; font-size: 0.7rem; }
    .dp-stat-icon { font-size: 0.68rem; }
    .dp-stat-val  { font-weight: 600; }
    .dp-stat-unit { font-size: 0.62rem; color: var(--dim); }

    /* ── Day section ── */
    .day-section { margin-bottom: 36px; scroll-margin-top: 20px; }
    .day-header {
      display: flex; align-items: center; justify-content: space-between;
      padding-bottom: 10px; margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .day-title { font-size: 1.05rem; font-weight: 700; }
    .day-badges { display: flex; gap: 8px; }
    .dbadge {
      font-size: 0.67rem; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.05em;
    }
    .dbadge.go      { background: rgba(16,185,129,0.15); color: #34d399; border: 1px solid rgba(16,185,129,0.25); }
    .dbadge.caution { background: rgba(245,158,11,0.15);  color: #fbbf24; border: 1px solid rgba(245,158,11,0.25); }
    .dbadge.danger    { background: rgba(239,68,68,0.15);   color: #f87171; border: 1px solid rgba(239,68,68,0.25); }

    /* ── Cards grid ── */
    .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(195px, 1fr)); gap: 12px; }

    /* ── Forecast card ── */
    .fc {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .fc:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

    .fc-top { height: 4px; }
    .fc-top.go      { background: linear-gradient(90deg, #059669, #10b981); }
    .fc-top.caution { background: linear-gradient(90deg, #d97706, #f59e0b); }
    .fc-top.danger    { background: linear-gradient(90deg, #dc2626, #ef4444); }

    .fc-body { padding: 13px 14px; }

    .fc-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 11px; }
    .fc-time { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; }
    .fc-status {
      font-size: 0.62rem; font-weight: 700; padding: 3px 8px;
      border-radius: 20px; letter-spacing: 0.06em;
    }
    .fc-status.go      { background: rgba(16,185,129,0.2);  color: #34d399; }
    .fc-status.caution { background: rgba(245,158,11,0.2);  color: #fbbf24; }
    .fc-status.danger    { background: rgba(239,68,68,0.2);   color: #f87171; }

    .fc-label { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dim); margin-bottom: 3px; }
    .fc-section-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .fc-section-label.wind  { color: #94a3b8; }
    .fc-section-label.waves { color: #60a5fa; }
    .fc-temp-row  { display: flex; justify-content: space-between; align-items: center; margin-top: 2px; }
    .fc-temp-item { display: flex; align-items: center; gap: 3px; font-size: 0.75rem; font-weight: 600; }

    .fc-wind-speed { font-size: 1.6rem; font-weight: 800; line-height: 1; }
    .fc-wind-speed sup { font-size: 0.65rem; font-weight: 500; color: var(--muted); vertical-align: super; margin-left: 1px; }
    .fc-wind-sub { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .fc-gust-val { font-weight: 600; }
    .fc-section { display: flex; align-items: center; justify-content: space-between; }
    .fc-section-left { flex: 1; min-width: 0; }
    .big-dir-arrow {
      font-size: 3rem; line-height: 1; color: #ef4444;
      display: flex; align-items: center; justify-content: center;
      width: 3rem; flex-shrink: 0; margin-left: 6px;
    }

    .fc-hr { height: 1px; background: var(--border); margin: 10px 0; }

    .fc-wave-val { font-size: 1.35rem; font-weight: 800; line-height: 1; }
    .fc-wave-val sup { font-size: 0.63rem; font-weight: 500; color: var(--muted); vertical-align: super; }
    .fc-swell-row { display: flex; gap: 10px; margin-top: 4px; }
    .fc-swell { font-size: 0.72rem; }
    .fc-swell-lbl { color: var(--dim); margin-right: 2px; font-weight: 600; }

    .fc-rain-row { display: flex; align-items: center; justify-content: space-between; }
    .fc-rain-val { font-size: 0.82rem; font-weight: 600; }

    /* ── Meta row ── */
    .meta-row { font-size: 0.73rem; color: var(--dim); margin-bottom: 18px; display: flex; gap: 16px; }

  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>&#x1F6F6; <em>SeaSense</em></h1>
      <div class="header-tagline">Know before you go · Catch the right moment</div>
    </div>
    <div class="header-right">
      <div class="header-loc">
        <label>📍 Location:</label>
        <select id="locationSelect" onchange="onLocationChange()">
          <option value="michmoret">Michmoret</option>
          <option value="netanya">Netanya</option>
          <option value="herzliya">Herzliya Marina</option>
          <option value="tel_aviv">Tel Aviv (Gordon Beach)</option>
          <option value="caesarea">Caesarea</option>
          <option value="haifa">Haifa</option>
          <option value="acre">Acre (Akko)</option>
          <option value="nahariya">Nahariya</option>
          <option value="ashdod">Ashdod</option>
          <option value="ashkelon">Ashkelon</option>
          <option value="eilat">Eilat (Red Sea)</option>
          <option value="custom">Custom coordinates...</option>
        </select>
      </div>
      <div class="custom-coords header-loc" id="customCoords">
        <label>Lat:</label>
        <input type="number" id="customLat" step="0.01" min="-90" max="90" placeholder="32.40" />
        <label>Lon:</label>
        <input type="number" id="customLon" step="0.01" min="-180" max="180" placeholder="34.87" />
      </div>
      <button class="drawer-btn" onclick="toggleDrawer()" aria-label="Settings">☰</button>
    </div>
  </div>
</header>

<!-- Settings bar -->
<div class="ctrl-bar">
  <label class="model-label">Wind Model:</label>
  <select id="modelSelect">
    <option value="iconEu">ICON EU — Europe / Mediterranean</option>
    <option value="ecmwf">ECMWF IFS — Global (high res)</option>
    <option value="gfs">GFS — Global</option>
  </select>
  <div class="bar-sep"></div>
  <label class="model-label">Wind Units:</label>
  <select id="windUnitSelect" onchange="onUnitChange()">
    <option value="kn">Knots (kn)</option>
    <option value="kmh">km/h</option>
  </select>
  <button class="btn" id="fetchBtn" onclick="fetchForecast()">Get Forecast</button>
  <button class="btn" id="sunBtn" onclick="openSunModal()" style="background:var(--elevated);border:1px solid var(--border);color:var(--text)">☀️ Sun &amp; UV</button>
  <button class="btn" id="shareBtn" onclick="copyShareURL()" style="background:var(--elevated);border:1px solid var(--border);color:var(--text)">🔗 Share</button>
</div>
<div id="toast"></div>

<!-- Sun & UV Modal -->
<div class="modal-overlay" id="sunModal" onclick="closeSunModalOutside(event)">
  <div class="modal-box">
    <button class="modal-close" onclick="closeSunModal()">✕</button>
    <div class="modal-title">☀️ Sunrise, Sunset &amp; UV Index</div>
    <div id="sunModalBody"><div class="modal-loading">Loading…</div></div>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleDrawer()"></div>
<div class="page-layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">

    <!-- Model info -->
    <div class="sb-title">📡 Wind Model</div>
    <div class="sb-model-info" id="modelInfo">
      <div class="sb-model-name" id="modelInfoName"></div>
      <div class="sb-model-desc" id="modelInfoDesc"></div>
    </div>

    <div class="sb-sep"></div>

    <div class="sb-title">⚙️ Thresholds</div>

    <div class="sb-group">
      <span class="sb-badge caution">CAUTION</span>
      <div class="sb-field">
        <label class="sb-lbl">Wind above (<span class="wind-unit-lbl">kn</span>)</label>
        <input class="sb-input" type="number" id="thCautWind" min="1" max="200" step="1" value="12" />
      </div>
      <div class="sb-field">
        <label class="sb-lbl">Waves above (m)</label>
        <input class="sb-input" type="number" id="thCautWave" min="0.1" max="5" step="0.1" value="0.6" />
      </div>
    </div>

    <div class="sb-sep"></div>

    <div class="sb-group">
      <span class="sb-badge danger">DANGER</span>
      <div class="sb-field">
        <label class="sb-lbl">Wind above (<span class="wind-unit-lbl">kn</span>)</label>
        <input class="sb-input" type="number" id="thDangerWind" min="1" max="200" step="1" value="18" />
      </div>
      <div class="sb-field">
        <label class="sb-lbl">Waves above (m)</label>
        <input class="sb-input" type="number" id="thDangerWave" min="0.1" max="5" step="0.1" value="1.0" />
      </div>
    </div>

    <button class="sb-apply" onclick="applyThresholds()">✓ Apply</button>
  </aside>

  <!-- Main content -->
  <div class="main">
    <div id="status" style="display:none"></div>
    <div id="output"></div>
  </div>

</div>

<script>
  const OM_WIND_URL   = 'https://api.open-meteo.com/v1/forecast';
  const OM_MARINE_URL = 'https://marine-api.open-meteo.com/v1/marine';

  const LOCATIONS = {
    michmoret: { name: 'Michmoret',             lat: 32.40, lon: 34.87, sea: 'Mediterranean Sea' },
    netanya:   { name: 'Netanya',               lat: 32.33, lon: 34.86, sea: 'Mediterranean Sea' },
    herzliya:  { name: 'Herzliya Marina',        lat: 32.16, lon: 34.79, sea: 'Mediterranean Sea' },
    tel_aviv:  { name: 'Tel Aviv',               lat: 32.08, lon: 34.76, sea: 'Mediterranean Sea' },
    caesarea:  { name: 'Caesarea',               lat: 32.50, lon: 34.90, sea: 'Mediterranean Sea' },
    haifa:     { name: 'Haifa',                  lat: 32.82, lon: 34.99, sea: 'Mediterranean Sea' },
    acre:      { name: 'Acre (Akko)',             lat: 32.93, lon: 35.07, sea: 'Mediterranean Sea' },
    nahariya:  { name: 'Nahariya',               lat: 33.01, lon: 35.10, sea: 'Mediterranean Sea' },
    ashdod:    { name: 'Ashdod',                 lat: 31.80, lon: 34.64, sea: 'Mediterranean Sea' },
    ashkelon:  { name: 'Ashkelon',               lat: 31.67, lon: 34.57, sea: 'Mediterranean Sea' },
    eilat:     { name: 'Eilat',                  lat: 29.56, lon: 34.95, sea: 'Red Sea' },
    custom:    { name: 'Custom',                 lat: null,  lon: null,  sea: '' },
  };

  function getCoords() {
    const sel = document.getElementById('locationSelect').value;
    if (sel === 'custom') {
      const lat = parseFloat(document.getElementById('customLat').value);
      const lon = parseFloat(document.getElementById('customLon').value);
      if (isNaN(lat) || isNaN(lon)) return null;
      return { lat, lon, name: `${lat.toFixed(2)}°N, ${lon.toFixed(2)}°E`, sea: '' };
    }
    return LOCATIONS[sel] || LOCATIONS.michmoret;
  }

  function toggleDrawer() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }

  // ── Sun & UV Modal ──────────────────────────────────────────
  function openSunModal() {
    document.getElementById('sunModal').classList.add('open');
    loadSunUV();
  }
  function closeSunModal() {
    document.getElementById('sunModal').classList.remove('open');
  }
  function closeSunModalOutside(e) {
    if (e.target === document.getElementById('sunModal')) closeSunModal();
  }

  async function loadSunUV() {
    const body = document.getElementById('sunModalBody');
    body.innerHTML = '<div class="modal-loading"><div class="spinner" style="margin:0 auto 8px"></div>Fetching sun data…</div>';
    const loc = getCoords();
    if (!loc) { body.innerHTML = '<div class="modal-loading">⚠️ No location selected.</div>'; return; }
    try {
      const url = `${OM_WIND_URL}?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&daily=sunrise,sunset,uv_index_max,uv_index_clear_sky_max` +
        `&timezone=Asia%2FJerusalem&forecast_days=7`;
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      renderSunUV(data.daily, loc.name);
    } catch(e) {
      body.innerHTML = `<div class="modal-loading" style="color:#f87171">Error: ${e.message}</div>`;
    }
  }

  function uvClass(uv) {
    if (uv == null) return '';
    if (uv <= 2)  return 'uv-low';
    if (uv <= 5)  return 'uv-moderate';
    if (uv <= 7)  return 'uv-high';
    if (uv <= 10) return 'uv-veryhigh';
    return 'uv-extreme';
  }
  function uvLabel(uv) {
    if (uv == null) return '—';
    if (uv <= 2)  return `${uv.toFixed(1)} Low`;
    if (uv <= 5)  return `${uv.toFixed(1)} Moderate`;
    if (uv <= 7)  return `${uv.toFixed(1)} High`;
    if (uv <= 10) return `${uv.toFixed(1)} Very High`;
    return `${uv.toFixed(1)} Extreme`;
  }
  function fmtTime(isoStr) {
    // "2026-04-02T05:43" → "05:43"
    return isoStr ? isoStr.slice(11, 16) : '—';
  }
  function fmtDaylight(rise, set) {
    if (!rise || !set) return '—';
    const mins = Math.round((new Date(set) - new Date(rise)) / 60000);
    return `${Math.floor(mins/60)}h ${mins%60}m`;
  }

  function renderSunUV(daily, locName) {
    const todayStr = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Jerusalem' }); // YYYY-MM-DD
    const days = daily.time || [];
    let rows = '';
    days.forEach((dateStr, i) => {
      const isToday = dateStr === todayStr;
      const dow = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short' });
      const d   = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const uv  = daily.uv_index_max?.[i];
      rows += `<tr>
        <td><span class="sun-day ${isToday ? 'sun-today' : ''}">${isToday ? 'Today' : dow}<br><span style="font-size:0.75rem;font-weight:400;color:var(--muted)">${d}</span></span></td>
        <td>🌅 ${fmtTime(daily.sunrise?.[i])}</td>
        <td>🌇 ${fmtTime(daily.sunset?.[i])}</td>
        <td style="color:var(--muted)">${fmtDaylight(daily.sunrise?.[i], daily.sunset?.[i])}</td>
        <td><span class="uv-badge ${uvClass(uv)}">${uvLabel(uv)}</span></td>
      </tr>`;
    });
    document.getElementById('sunModalBody').innerHTML = `
      <div style="font-size:0.75rem;color:var(--muted);margin-bottom:14px">📍 ${locName}</div>
      <table class="sun-table">
        <thead><tr>
          <th>Day</th><th>Sunrise</th><th>Sunset</th><th>Daylight</th><th>UV Max</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div style="font-size:0.68rem;color:var(--dim);margin-top:14px">UV scale: Low ≤2 · Moderate 3–5 · High 6–7 · Very High 8–10 · Extreme ≥11</div>
    `;
  }

  function onLocationChange() {
    const sel = document.getElementById('locationSelect').value;
    const coords = document.getElementById('customCoords');
    coords.classList.toggle('visible', sel === 'custom');
    updateHeaderLocation();
  }

  function updateHeaderLocation() {
    const loc = getCoords();
    if (!loc) return;
    document.title = `SeaSense — ${loc.name}`;
  }

  const modelSelect = document.getElementById('modelSelect');
  const savedModel  = localStorage.getItem('ssModel') || 'iconEu';
  const savedLoc    = localStorage.getItem('windyLocation');
  modelSelect.value = savedModel;
  if (savedLoc)   { document.getElementById('locationSelect').value = savedLoc; onLocationChange(); }
  updateHeaderLocation();
  const savedUnit = localStorage.getItem('windUnit');
  if (savedUnit)  document.getElementById('windUnitSelect').value = savedUnit;
  document.querySelectorAll('.wind-unit-lbl').forEach(el => el.textContent = windUnitLabel());

  // Load saved thresholds
  const thInputs = ['thCautWind','thCautWave','thDangerWind','thDangerWave'];
  thInputs.forEach(id => {
    const v = localStorage.getItem(id);
    if (v !== null) document.getElementById(id).value = v;
  });

  function getThresholds() {
    const isKmh   = getWindUnit() === 'kmh';
    const toKt    = v => isKmh ? v / KT_TO_KMH : v;
    return {
      cautWind:   toKt(parseFloat(document.getElementById('thCautWind').value)   || (isKmh ? 22 : 12)),
      cautWave:        parseFloat(document.getElementById('thCautWave').value)   || 0.6,
      dangerWind: toKt(parseFloat(document.getElementById('thDangerWind').value) || (isKmh ? 33 : 18)),
      dangerWave:      parseFloat(document.getElementById('thDangerWave').value) || 1.0,
    };
  }

  function saveThresholds() {
    thInputs.forEach(id => localStorage.setItem(id, document.getElementById(id).value));
  }

  function applyThresholds() {
    saveThresholds();
    // Close drawer on mobile
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
    if (document.getElementById('output').innerHTML.trim()) {
      fetchForecast();
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    if (!msg) { el.style.display = 'none'; return; }
    el.className = 'status-bar ' + type;
    el.innerHTML = type === 'loading' ? `<div class="spinner"></div>${msg}` : msg;
    el.style.display = 'flex';
  }

  const OM_MODEL_MAP   = { gfs: 'gfs_seamless', iconEu: 'icon_eu', ecmwf: 'ecmwf_ifs025' };
  const OM_MODEL_LABEL = { gfs: 'GFS', iconEu: 'ICON EU', ecmwf: 'ECMWF IFS' };
  const OM_MODEL_DESC  = {
    iconEu: { name: 'ICON EU — Best for coastal paddling', desc: '⭐ Recommended for Israeli coast. High-resolution (~7 km) German model covering Europe & the Mediterranean. Captures sea breezes, coastal wind shifts, and near-shore conditions better than global models. Best for same-day and next-day decisions.' },
    ecmwf:  { name: 'ECMWF IFS — Best for trip planning', desc: 'Widely considered the world\'s most accurate global model. Less detailed at the coastline, but superior skill at 3–7 day range. Use it to spot approaching rough weather earlier in the week.' },
    gfs:    { name: 'GFS — Global Forecast System', desc: 'NOAA\'s global model. Updated 4×/day. Reliable backup and good for cross-checking, but lower coastal resolution than ICON EU.' },
  };

  function updateModelInfo() {
    const m = document.getElementById('modelSelect').value;
    const info = OM_MODEL_DESC[m] || {};
    document.getElementById('modelInfoName').textContent = info.name || '';
    document.getElementById('modelInfoDesc').textContent = info.desc || '';
  }
  document.getElementById('modelSelect').addEventListener('change', updateModelInfo);
  updateModelInfo();

  async function fetchOpenMeteoWind(model) {
    const { lat, lon } = getCoords();
    const omModel = OM_MODEL_MAP[model] || 'gfs_seamless';
    const url = `${OM_WIND_URL}?latitude=${lat}&longitude=${lon}` +
      `&hourly=windspeed_10m,windgusts_10m,winddirection_10m,precipitation,precipitation_probability,temperature_2m` +
      `&wind_speed_unit=ms&timezone=UTC&forecast_days=7&models=${omModel}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`Open-Meteo wind API HTTP ${res.status}`);
    const data = await res.json();

    const ts = [], windKt = [], gustKt = [], deg = [], rainMm = [], rainPct = [], airTempC = [];
    (data.hourly?.time || []).forEach((isoStr, i) => {
      const d = new Date(isoStr + ':00Z');
      if (d.getUTCHours() % 3 !== 0) return; // 3-hour intervals only
      ts.push(d.getTime());
      windKt.push((data.hourly.windspeed_10m?.[i]   ?? 0) * M2KT);
      gustKt.push((data.hourly.windgusts_10m?.[i]   ?? 0) * M2KT);
      deg.push(   data.hourly.winddirection_10m?.[i] ?? 0);
      rainMm.push(data.hourly.precipitation?.[i]              ?? 0);
      rainPct.push(data.hourly.precipitation_probability?.[i] ?? null);
      airTempC.push(data.hourly.temperature_2m?.[i]           ?? null);
    });
    return { ts, windKt, gustKt, deg, rainMm, rainPct, airTempC };
  }

  async function fetchEcmwfWam() {
    const { lat, lon } = getCoords();
    const url = `${OM_MARINE_URL}?latitude=${lat}&longitude=${lon}` +
      `&hourly=wave_height,wave_direction,swell_wave_height,swell_wave_direction,secondary_swell_wave_height,secondary_swell_wave_direction,sea_surface_temperature` +
      `&models=ecmwf_wam&timezone=UTC&forecast_days=7`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`ECMWF WAM (Open-Meteo) HTTP ${res.status}`);
    const data = await res.json();
    const lookup = {};
    (data.hourly?.time || []).forEach((isoStr, i) => {
      const t = new Date(isoStr + ':00Z').getTime();
      lookup[t] = {
        wh:        data.hourly.wave_height?.[i]                         ?? null,
        whd:       data.hourly.wave_direction?.[i]                      ?? null,
        sw1:       data.hourly.swell_wave_height?.[i]                   ?? null,
        sw1d:      data.hourly.swell_wave_direction?.[i]                ?? null,
        sw2:       data.hourly.secondary_swell_wave_height?.[i]         ?? null,
        sw2d:      data.hourly.secondary_swell_wave_direction?.[i]      ?? null,
        waterTempC: data.hourly.sea_surface_temperature?.[i]            ?? null,
      };
    });
    return lookup;
  }

  async function fetchForecast() {
    const loc = getCoords();
    if (!loc) { setStatus('Please enter valid custom coordinates.', 'error'); return; }
    localStorage.setItem('ssModel', modelSelect.value);
    localStorage.setItem('windyLocation', document.getElementById('locationSelect').value);
    updateHeaderLocation();

    const btn = document.getElementById('fetchBtn');
    btn.disabled = true;
    btn.textContent = 'Loading...';
    setStatus('Fetching forecast data...', 'loading');
    document.getElementById('output').innerHTML = '';

    try {
      const [windData, waveLookup] = await Promise.all([
        fetchOpenMeteoWind(modelSelect.value),
        fetchEcmwfWam()
      ]);

      setStatus('', '');
      renderForecast(windData, waveLookup);
    } catch (e) {
      setStatus('Error: ' + e.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Get Forecast';
    }
  }

  const M2KT     = 1.94384;
  const KT_TO_KMH = 1.852;

  function getWindUnit()   { return localStorage.getItem('windUnit') || 'kn'; }
  function windUnitLabel() { return getWindUnit() === 'kmh' ? 'km/h' : 'kn'; }
  function windDisp(kt)    { return getWindUnit() === 'kmh' ? kt * KT_TO_KMH : kt; }

  function onUnitChange() {
    const newUnit = document.getElementById('windUnitSelect').value;
    const oldUnit = localStorage.getItem('windUnit') || 'kn';
    if (newUnit !== oldUnit) {
      ['thCautWind','thDangerWind'].forEach(id => {
        const el  = document.getElementById(id);
        const val = parseFloat(el.value);
        if (!isNaN(val))
          el.value = newUnit === 'kmh'
            ? Math.round(val * KT_TO_KMH)
            : Math.round(val / KT_TO_KMH);
      });
      localStorage.setItem('windUnit', newUnit);
      saveThresholds();
    }
    document.querySelectorAll('.wind-unit-lbl').forEach(el => el.textContent = windUnitLabel());
  }

  function windDeg(u, v) {
    return (Math.atan2(-u, -v) * 180 / Math.PI + 360) % 360;
  }

  function dirArrow(deg) {
    return ['↓','↙','←','↖','↑','↗','→','↘'][Math.round(((deg + 180) % 360) / 45) % 8];
  }

  function dirLabel(deg) {
    return ['N','NE','E','SE','S','SW','W','NW','N'][Math.round(deg / 45)];
  }

  function bigDirArrow(deg, color) {
    const c = color || 'var(--dim)';
    if (deg == null) return `<div class="big-dir-arrow" style="color:var(--dim)">—</div>`;
    return `<div class="big-dir-arrow" style="color:${c}"><span style="display:inline-block;transform:rotate(${(Math.round(deg) + 180) % 360}deg);line-height:1">↑</span></div>`;
  }

  function windColor(kt) {
    if (kt < 5)  return '#34d399';
    if (kt < 11) return '#86efac';
    if (kt < 17) return '#fbbf24';
    if (kt < 22) return '#fb923c';
    return '#f87171';
  }

  function waveColor(m) {
    if (m == null) return '#4a6a8a';
    if (m < 0.3)   return '#34d399';
    if (m < 0.6)   return '#86efac';
    if (m < 1.0)   return '#fbbf24';
    if (m < 1.5)   return '#fb923c';
    return '#f87171';
  }

  function rainColor(mm) {
    if (mm < 0.1) return '#4a6a8a';
    if (mm < 1.0) return '#93c5fd';
    if (mm < 5.0) return '#3b82f6';
    return '#a78bfa';
  }

  function status(windKt, gustKt, waveM) {
    const th = getThresholds();
    if (windKt >= th.dangerWind || waveM >= th.dangerWave) return 'danger';
    if (windKt >= th.cautWind   || waveM >= th.cautWave)   return 'caution';
    return 'go';
  }

  const LABELS = { go: 'GO', caution: 'CAUTION', danger: '⚠ DANGER' };

  function findNearest(lookup, t) {
    const keys = Object.keys(lookup).map(Number);
    if (!keys.length) return null;
    const closest = keys.reduce((a, b) => Math.abs(b - t) < Math.abs(a - t) ? b : a);
    return Math.abs(closest - t) < 2 * 3600 * 1000 ? lookup[closest] : null;
  }

  function renderForecast(windData, wLookup) {
    const th   = getThresholds();
    const { ts, windKt: windKts, gustKt: gustKts, deg: degs, rainMm: rains, rainPct: rainPcts, airTempC: airTemps } = windData;

    // Build rows grouped by day
    const days = {}, dayOrder = [];
    ts.forEach((t, i) => {
      const d = new Date(t);
      const localHour = parseInt(d.toLocaleTimeString('en-IL', { hour: '2-digit', hour12: false, timeZone: 'Asia/Jerusalem' }));
      if ([21, 0, 3].includes(localHour)) return; // skip night slots
      if (t < Date.now()) return; // skip past slots
      const key = d.toLocaleDateString('en-IL', { weekday: 'long', day: 'numeric', month: 'long', timeZone: 'Asia/Jerusalem' });
      const short = d.toLocaleDateString('en-IL', { weekday: 'short', day: 'numeric', month: 'short', timeZone: 'Asia/Jerusalem' });
      if (!days[key]) { days[key] = { rows: [], short }; dayOrder.push(key); }

      const windKt = windKts[i];
      const gustKt = gustKts[i];
      const deg    = degs[i];
      const rainMm   = rains[i];
      const rainPct  = rainPcts?.[i]  ?? null;
      const airTempC = airTemps?.[i]  ?? null;
      const wv     = wLookup[t] || findNearest(wLookup, t) || {};
      const wh         = wv.wh         ?? null;
      const whd        = wv.whd        ?? null;
      const sw1        = wv.sw1        ?? null;
      const sw1d       = wv.sw1d       ?? null;
      const sw2        = wv.sw2        ?? null;
      const sw2d       = wv.sw2d       ?? null;
      const waterTempC = wv.waterTempC ?? null;
      const st         = status(windKt, gustKt, wh ?? 0);

      days[key].rows.push({ t, d, windKt, gustKt, deg, rainMm, rainPct, airTempC, wh, whd, sw1, sw1d, sw2, sw2d, waterTempC, st });
    });

    // HTML
    let html = `
      <div class="meta-row">
        <span>Last updated: ${new Date().toLocaleTimeString('en-IL', { timeZone: 'Asia/Jerusalem' })} IDT</span>
        <span>${dayOrder.length} days</span>
        <span class="refresh-timer" id="refreshTimer" onclick="fetchForecast()" title="Click to refresh now">⟳ —</span>
      </div>


      <div class="day-nav">`;

    dayOrder.forEach(dk => {
      const { rows, short } = days[dk];
      const [wd, ...rest] = short.split(' ');

      const windMin  = Math.min(...rows.map(r => r.windKt));
      const windMax  = Math.max(...rows.map(r => r.windKt));
      const waves    = rows.map(r => r.wh).filter(w => w != null);
      const waveMin  = waves.length ? Math.min(...waves) : null;
      const waveMax  = waves.length ? Math.max(...waves) : null;
      const rainPcts = rows.map(r => r.rainPct).filter(p => p != null);
      const rainMax  = rainPcts.length ? Math.max(...rainPcts) : null;

      const wMin    = windDisp(windMin).toFixed(0);
      const wMax    = windDisp(windMax).toFixed(0);
      const waveStr = waveMin != null ? `${waveMin.toFixed(1)}–${waveMax.toFixed(1)}` : '—';
      const rainPillColor = rainMax == null ? 'var(--dim)'
        : rainMax < 20 ? 'var(--dim)'
        : rainMax < 50 ? '#93c5fd'
        : rainMax < 75 ? '#3b82f6'
        : '#a78bfa';

      // Wind trend: compare avg of first half vs second half
      const windSlots = rows.map(r => r.windKt);
      const half = Math.ceil(windSlots.length / 2);
      const avg1 = windSlots.slice(0, half).reduce((a, b) => a + b, 0) / half;
      const avg2 = windSlots.slice(half).reduce((a, b) => a + b, 0) / (windSlots.length - half || 1);
      const diff  = avg2 - avg1;
      const trendArrow = diff > 2 ? '↗' : diff < -2 ? '↘' : '→';
      const trendClass = diff > 2 ? 'up' : diff < -2 ? 'down' : 'flat';

      html += `<a class="day-pill" href="#day-${dk.replace(/\W/g,'_')}">
        <div class="dp-weekday">${wd}</div>
        <div class="dp-date">${rest.join(' ')}</div>
        <div class="dp-stats">
          <div class="dp-stat-row">
            <span class="dp-stat-icon">💨</span>
            <span class="dp-stat-val" style="color:${windColor(windMax)}">${wMin}–${wMax}</span>
            <span class="dp-stat-unit">${windUnitLabel()}</span>
            <span class="dp-trend ${trendClass}">${trendArrow}</span>
          </div>
          <div class="dp-stat-row">
            <span class="dp-stat-icon">🌊</span>
            <span class="dp-stat-val" style="color:${waveColor(waveMax)}">${waveStr}</span>
            <span class="dp-stat-unit">${waveMin != null ? 'm' : ''}</span>
          </div>
          <div class="dp-stat-row">
            <span class="dp-stat-icon">🌧</span>
            <span class="dp-stat-val" style="color:${rainPillColor}">${rainMax != null ? rainMax + '%' : '—'}</span>
            <span class="dp-stat-unit">${rainMax != null ? 'max' : ''}</span>
          </div>
        </div>
      </a>`;
    });

    html += `</div>`;

    dayOrder.forEach(dk => {
      const { rows } = days[dk];
      const goCnt   = rows.filter(r => r.st === 'go').length;
      const cautCnt = rows.filter(r => r.st === 'caution').length;
      const dangerCnt = rows.filter(r => r.st === 'danger').length;
      const id = 'day-' + dk.replace(/\W/g,'_');

      html += `<div class="day-section" id="${id}">
        <div class="day-header">
          <div class="day-title">${dk}</div>
          <div class="day-badges">
            ${goCnt   > 0 ? `<span class="dbadge go">${goCnt} GO</span>` : ''}
            ${cautCnt > 0 ? `<span class="dbadge caution">${cautCnt} CAUTION</span>` : ''}
            ${dangerCnt > 0 ? `<span class="dbadge danger">${dangerCnt} DANGER</span>` : ''}
          </div>
        </div>
        <div class="cards">`;

      rows.forEach(r => {
        const time  = r.d.toLocaleTimeString('en-IL', { hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Jerusalem' });
        const wc    = windColor(r.windKt);
        const gc    = windColor(r.gustKt);
        const whC   = waveColor(r.wh);
        const sw1C  = waveColor(r.sw1);
        const sw2C  = waveColor(r.sw2);
        const rc       = rainColor(r.rainMm);
        const fmtW     = m => m != null ? `${m.toFixed(2)}<sup>m</sup>` : '—';
        const rainMmStr  = r.rainMm < 0.05 ? '' : `${r.rainMm.toFixed(1)} mm`;
        const rainPctStr = r.rainPct != null ? `${r.rainPct}%` : '—';
        const rainPctColor = r.rainPct == null ? 'var(--dim)'
          : r.rainPct < 20 ? 'var(--dim)'
          : r.rainPct < 50 ? '#93c5fd'
          : r.rainPct < 75 ? '#3b82f6'
          : '#a78bfa';
        const airTempStr   = r.airTempC   != null ? `${Math.round(r.airTempC)}°C`   : '—';
        const waterTempStr = r.waterTempC != null ? `${Math.round(r.waterTempC)}°C` : '—';
        const airTempColor = r.airTempC == null ? 'var(--dim)'
          : r.airTempC < 15 ? '#93c5fd'
          : r.airTempC < 25 ? '#34d399'
          : '#fb923c';
        const waterTempColor = r.waterTempC == null ? 'var(--dim)'
          : r.waterTempC < 18 ? '#93c5fd'
          : r.waterTempC < 24 ? '#34d399'
          : '#fb923c';

        html += `
        <div class="fc">
          <div class="fc-top ${r.st}"></div>
          <div class="fc-body">
            <div class="fc-head">
              <span class="fc-time">${time}</span>
              <span class="fc-status ${r.st}">${LABELS[r.st]}</span>
            </div>

            <div class="fc-section-label wind">Wind</div>
            <div class="fc-section">
              <div class="fc-section-left">
                <div class="fc-wind-speed" style="color:${wc}">${windDisp(r.windKt).toFixed(1)}<sup>${windUnitLabel()}</sup></div>
                <div class="fc-wind-sub">${dirLabel(r.deg)} ${Math.round(r.deg)}°</div>
                <div class="fc-wind-sub">Gusts <span class="fc-gust-val" style="color:${gc}">${windDisp(r.gustKt).toFixed(1)} ${windUnitLabel()}</span></div>
              </div>
              ${bigDirArrow(r.deg, wc)}
            </div>

            <div class="fc-hr"></div>

            <div class="fc-section-label waves">Waves</div>
            <div class="fc-section">
              <div class="fc-section-left">
                <div class="fc-wave-val" style="color:${whC}">${fmtW(r.wh)}</div>
                ${r.whd != null ? `<div class="fc-wind-sub">${dirLabel(r.whd)} ${Math.round(r.whd)}°</div>` : ''}
              </div>
              ${bigDirArrow(r.whd, whC)}
            </div>
            ${(r.sw1 != null || r.sw2 != null) ? `<div class="fc-swell-row">
              <div class="fc-swell"><span class="fc-swell-lbl">S1</span><span style="color:${sw1C}">${r.sw1 != null ? r.sw1.toFixed(2)+'m' : '—'}</span>${r.sw1d != null ? ` <span class="dir-arrow" style="color:var(--muted)">${dirArrow(r.sw1d)}</span><span style="color:var(--muted);font-size:0.7rem">${dirLabel(r.sw1d)}</span>` : ''}</div>
              <div class="fc-swell"><span class="fc-swell-lbl">S2</span><span style="color:${sw2C}">${r.sw2 != null ? r.sw2.toFixed(2)+'m' : '—'}</span>${r.sw2d != null ? ` <span class="dir-arrow" style="color:var(--muted)">${dirArrow(r.sw2d)}</span><span style="color:var(--muted);font-size:0.7rem">${dirLabel(r.sw2d)}</span>` : ''}</div>
            </div>` : ''}

            <div class="fc-hr"></div>

            <div class="fc-temp-row">
              <div class="fc-temp-item"><span style="color:var(--dim)">🌡</span><span style="color:${airTempColor}">${airTempStr}</span><span style="color:var(--dim);margin-left:4px;font-size:0.7rem">💧</span><span style="color:${waterTempColor};font-size:0.7rem">${waterTempStr}</span></div>
              <div class="fc-temp-item" style="gap:2px">
                <span style="color:var(--dim)">🌧</span><span style="color:${rainPctColor};font-weight:700">${rainPctStr}</span>${rainMmStr ? `<span style="color:var(--dim);font-size:0.72rem;margin-left:3px">${rainMmStr}</span>` : ''}
              </div>
            </div>
          </div>
        </div>`;
      });

      html += `</div></div>`;
    });

    document.getElementById('output').innerHTML = html;
  }

  // ── Shareable URL ───────────────────────────────────────────
  function buildShareURL() {
    const p = new URLSearchParams();
    const sel = document.getElementById('locationSelect').value;
    p.set('loc', sel);
    if (sel === 'custom') {
      p.set('lat', document.getElementById('customLat').value);
      p.set('lon', document.getElementById('customLon').value);
    }
    p.set('model', document.getElementById('modelSelect').value);
    p.set('unit',  document.getElementById('windUnitSelect').value);
    p.set('thcw',  document.getElementById('thCautWind').value);
    p.set('thcwv', document.getElementById('thCautWave').value);
    p.set('thdw',  document.getElementById('thDangerWind').value);
    p.set('thdwv', document.getElementById('thDangerWave').value);
    return `${location.origin}${location.pathname}?${p.toString()}`;
  }

  async function copyShareURL() {
    try {
      await navigator.clipboard.writeText(buildShareURL());
      showToast('🔗 Link copied to clipboard!');
    } catch(e) {
      // Fallback for non-HTTPS / older browsers
      const inp = document.createElement('input');
      inp.value = buildShareURL();
      document.body.appendChild(inp);
      inp.select(); document.execCommand('copy');
      document.body.removeChild(inp);
      showToast('🔗 Link copied!');
    }
  }

  function applyURLParams() {
    const p = new URLSearchParams(location.search);
    if (!p.toString()) return; // nothing in URL
    if (p.has('loc')) {
      const locEl = document.getElementById('locationSelect');
      locEl.value = p.get('loc');
      onLocationChange();
    }
    if (p.has('lat')) document.getElementById('customLat').value = p.get('lat');
    if (p.has('lon')) document.getElementById('customLon').value = p.get('lon');
    if (p.has('model')) document.getElementById('modelSelect').value = p.get('model');
    if (p.has('unit')) {
      document.getElementById('windUnitSelect').value = p.get('unit');
      localStorage.setItem('windUnit', p.get('unit'));
      document.querySelectorAll('.wind-unit-lbl').forEach(el => el.textContent = windUnitLabel());
    }
    const thMap = { thcw: 'thCautWind', thcwv: 'thCautWave', thdw: 'thDangerWind', thdwv: 'thDangerWave' };
    Object.entries(thMap).forEach(([key, id]) => {
      if (p.has(key)) document.getElementById(id).value = p.get(key);
    });
  }

  // ── Toast ────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // ── Auto-refresh (15 min) ────────────────────────────────────
  const AUTO_REFRESH_SEC = 15 * 60;
  let _refreshSecsLeft = AUTO_REFRESH_SEC;
  let _refreshInterval = null;

  function startAutoRefresh() {
    clearInterval(_refreshInterval);
    _refreshSecsLeft = AUTO_REFRESH_SEC;
    _refreshInterval = setInterval(() => {
      _refreshSecsLeft--;
      updateRefreshTimer();
      if (_refreshSecsLeft <= 0) {
        _refreshSecsLeft = AUTO_REFRESH_SEC;
        fetchForecast();
      }
    }, 1000);
    updateRefreshTimer();
  }

  function updateRefreshTimer() {
    const el = document.getElementById('refreshTimer');
    if (!el) return;
    const m = Math.floor(_refreshSecsLeft / 60);
    const s = _refreshSecsLeft % 60;
    el.textContent = `⟳ ${m}:${String(s).padStart(2,'0')}`;
  }

  // ── Init ─────────────────────────────────────────────────────
  applyURLParams();
  fetchForecast().then(() => startAutoRefresh());
</script>
</body>
</html>
